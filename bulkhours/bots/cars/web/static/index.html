<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PiCar-X Control Deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-top: #f9f4df;
      --bg-bot: #d8ece9;
      --ink: #122625;
      --muted: #355b58;
      --panel: #ffffffcc;
      --accent: #eb5e28;
      --accent-2: #2a9d8f;
      --danger: #c1121f;
      --ring: #0a9396;
      --shadow: 0 18px 40px rgba(11, 52, 49, 0.16);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(55vw 45vw at 100% 0%, #f4a26155, transparent 65%),
        radial-gradient(45vw 40vw at 0% 100%, #0a939633, transparent 70%),
        linear-gradient(160deg, var(--bg-top), var(--bg-bot));
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .deck {
      width: min(1200px, 97vw);
      background: var(--panel);
      backdrop-filter: blur(8px);
      border: 1px solid #ffffffaa;
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 1.2rem;
      animation: rise 500ms ease-out;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .title {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      margin: 0;
      letter-spacing: 0.02em;
    }

    .pill {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.8rem;
      padding: 0.35rem 0.6rem;
      border-radius: 999px;
      background: #ffffff;
      border: 1px solid #d0e6e3;
    }

    .battery {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.32rem 0.55rem;
      border-radius: 999px;
      background: #ffffff;
      border: 1px solid #d0e6e3;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.76rem;
      color: #234947;
    }

    .battery-label {
      font-weight: 600;
      color: #315d5a;
    }

    .battery-shell {
      width: 56px;
      height: 12px;
      border: 1px solid #9abebb;
      border-radius: 3px;
      position: relative;
      overflow: hidden;
      background: #edf7f6;
    }

    .battery-shell::after {
      content: "";
      position: absolute;
      right: -4px;
      top: 3px;
      width: 3px;
      height: 4px;
      border-radius: 0 2px 2px 0;
      background: #9abebb;
    }

    .battery-level {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #eb5e28, #f4a261, #2a9d8f);
      transition: width 180ms ease;
    }

    .battery.low .battery-level {
      background: #d62828;
    }

    .battery.na .battery-level {
      width: 18%;
      background: #a7c3c0;
    }

    .grid {
      display: grid;
      grid-template-columns: 0.9fr 1.4fr;
      gap: 1rem;
    }

    .panel {
      border-radius: var(--radius);
      background: #ffffffdd;
      border: 1px solid #d8e6e4;
      padding: 1rem;
    }

    .panel-camera {
      grid-column: 1 / -1;
    }

    .below-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.9rem;
      margin-top: 0.6rem;
    }

    .subpanel {
      border: 1px solid #d7e8e6;
      border-radius: 14px;
      background: #fbfffe;
      padding: 0.75rem;
    }

    .subpanel h3 {
      margin: 0 0 0.5rem;
      font-size: 0.95rem;
    }

    .panel h2 {
      margin: 0 0 0.8rem;
      font-size: 1rem;
    }

    .control-row {
      display: grid;
      gap: 0.5rem;
      margin-bottom: 0.8rem;
    }

    label {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent-2);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin-top: 0.4rem;
    }

    .joystick-wrap {
      margin: 0.6rem 0 0.8rem;
      display: grid;
      justify-items: center;
      gap: 0.5rem;
    }

    .joystick {
      width: min(260px, 68vw);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      position: relative;
      border: 2px solid #b7d9d4;
      background:
        radial-gradient(circle at 50% 50%, #f2fbfa 0%, #ddf0ed 55%, #cde7e3 100%);
      box-shadow: inset 0 8px 18px rgba(25, 86, 82, 0.15);
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .joystick::before,
    .joystick::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #8bbeb8;
      opacity: 0.45;
      pointer-events: none;
    }

    .joystick::before {
      width: 2px;
      height: 82%;
    }

    .joystick::after {
      height: 2px;
      width: 82%;
    }

    .joystick-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 34%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(180deg, #fff4e5, #ffd7a7);
      border: 2px solid #f2b56c;
      box-shadow: 0 8px 18px rgba(83, 47, 10, 0.22);
      pointer-events: none;
      transition: transform 60ms linear;
    }

    .joystick-readout {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.76rem;
      color: #254745;
      min-height: 1.2rem;
    }

    .joystick.camera {
      width: min(210px, 58vw);
      border-color: #cfd4ff;
      background:
        radial-gradient(circle at 50% 50%, #f6f6ff 0%, #e7e9ff 55%, #d9dcff 100%);
    }

    .joystick.camera::before,
    .joystick.camera::after {
      background: #7c84c9;
    }

    .joystick-knob.camera {
      background: linear-gradient(180deg, #f6f2ff, #d7cbff);
      border-color: #9d90e9;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 0.7rem 0.6rem;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease;
      box-shadow: 0 6px 12px rgba(20, 50, 48, 0.14);
      background: #e9f6f4;
      color: var(--ink);
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(1px); }
    button:focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; }

    .main-btn { background: #ffecd1; }
    .danger { background: #ffd8d8; color: var(--danger); }
    .accent { background: #e0faf7; color: #0f5f58; }

    .telemetry {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.8rem;
      background: #f4faf9;
      border: 1px solid #d4ebe7;
      border-radius: 12px;
      padding: 0.6rem;
      min-height: 110px;
      white-space: pre-wrap;
    }

    .video-wrap {
      border: 1px solid #d4ebe7;
      border-radius: 12px;
      background: #000;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      position: relative;
      margin-bottom: 0.8rem;
    }

    .camera-main-row {
      display: grid;
      grid-template-columns: 1.45fr 0.9fr;
      gap: 0.9rem;
      align-items: start;
    }

    .camera-main-row .video-wrap {
      width: 100%;
      max-width: min(760px, 100%);
      margin: 0;
    }

    .camera-side {
      border: 1px solid #d7e8e6;
      border-radius: 14px;
      background: #fbfffe;
      padding: 0.75rem;
    }

    .camera-side h3 {
      margin: 0 0 0.5rem;
      font-size: 0.95rem;
    }

    .camera-side .speak-box {
      margin-top: 0.65rem;
    }

    .video-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: absolute;
      inset: 0;
    }

    .video-wrap canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .video-joysticks {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 6;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0.55rem;
      pointer-events: none;
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.25));
    }

    .video-stick {
      display: grid;
      justify-items: center;
      gap: 0.25rem;
      pointer-events: auto;
    }

    .video-stick .joystick {
      width: min(112px, 24vw);
      border-width: 1px;
    }

    .video-stick .joystick.camera {
      width: min(102px, 22vw);
      border-width: 1px;
    }

    .video-stick .joystick-readout {
      color: #eefcf8;
      font-size: 0.7rem;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.55);
      min-height: 1rem;
    }

    .video-note {
      font-size: 0.8rem;
      color: #315451;
      margin-bottom: 0.8rem;
    }

    .hint {
      margin-top: 0.6rem;
      color: #315451;
      font-size: 0.8rem;
    }

    .speak-box {
      display: grid;
      gap: 0.45rem;
      margin-top: 0.8rem;
      padding: 0.7rem;
      border: 1px solid #d4ebe7;
      border-radius: 12px;
      background: #f7fcfb;
    }

    .speak-box textarea {
      width: 100%;
      min-height: 70px;
      resize: vertical;
      border: 1px solid #b9dad5;
      border-radius: 10px;
      padding: 0.55rem;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.92rem;
      color: var(--ink);
      background: #fff;
    }

    .speak-box select {
      width: 100%;
      border: 1px solid #b9dad5;
      border-radius: 10px;
      padding: 0.5rem 0.55rem;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      background: #fff;
    }

    .speak-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .speak-status {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.75rem;
      color: #355b58;
    }

    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
      .buttons { grid-template-columns: repeat(2, 1fr); }
      .camera-main-row { grid-template-columns: 1fr; }
      .below-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="deck">
    <div class="top">
      <h1 class="title">PiCar-X Control Deck</h1>
      <div class="top-right">
        <div id="batteryWidget" class="battery na">
          <span class="battery-label">Battery</span>
          <span class="battery-shell"><span id="batteryLevel" class="battery-level"></span></span>
          <span id="batteryText">N/A</span>
        </div>
        <div id="status" class="pill">connecting...</div>
      </div>
    </div>

    <section class="grid">
      <article class="panel panel-camera">
        <h2>Camera</h2>
        <div class="camera-main-row">
          <div class="video-wrap">
            <img id="cameraFeed" alt="PiCar camera stream" loading="eager" />
            <canvas id="detectOverlay" aria-label="Object detection overlay"></canvas>
            <div class="video-joysticks">
              <div class="video-stick">
                <div id="joystickArea" class="joystick" aria-label="Drive joystick">
                  <div id="joystickKnob" class="joystick-knob"></div>
                </div>
                <div id="joystickReadout" class="joystick-readout">x: 0.00 y: 0.00</div>
              </div>
              <div class="video-stick">
                <div id="cameraJoystickArea" class="joystick camera" aria-label="Camera joystick">
                  <div id="cameraJoystickKnob" class="joystick-knob camera"></div>
                </div>
                <div id="cameraJoystickReadout" class="joystick-readout">pan: -2 tilt: 0</div>
              </div>
            </div>
          </div>

          <div class="camera-side">
            <h3>Camera Info</h3>
            <div id="cameraInfo" class="video-note">Starting camera stream...</div>
            <div class="control-row">
              <label for="pan">Pan (-60 to 60)</label>
              <input id="pan" type="range" min="-60" max="60" value="-2" step="1" />
            </div>
            <div class="control-row">
              <label for="tilt">Tilt (-35 to 35)</label>
              <input id="tilt" type="range" min="-35" max="35" value="0" step="1" />
            </div>
            <div class="buttons">
              <button class="accent" id="btnApplyCam">Apply Camera</button>
              <button class="accent" id="btnRecenterCam">Recenter Camera</button>
              <button class="danger" id="btnEmergency">Emergency Stop</button>
            </div>

            <div class="speak-box">
              <label for="speakText">Parole (TTS)</label>
              <textarea id="speakText" maxlength="240" placeholder="Tape ton texte ici (ex: Bonjour, je suis pret.)"></textarea>
              <div class="speak-row">
                <button class="accent" id="btnSpeak">Parler</button>
                <span id="speakStatus" class="speak-status">TTS: en attente</span>
              </div>
              <label for="musicSelect">Musique</label>
              <select id="musicSelect" aria-label="Select music track">
                <option value="">Loading tracks...</option>
              </select>
              <div class="speak-row">
                <button class="main-btn" id="btnPlayMusic">Play Music</button>
                <button id="btnStopMusic">Stop Music</button>
                <span id="musicStatus" class="speak-status">Music: en attente</span>
              </div>
              <div class="speak-row">
                <button class="accent" id="btnDetectObject">Detect Object</button>
                <span id="detectStatus" class="speak-status">Vision: en attente</span>
              </div>
              <div id="detectResult" class="video-note">Seen objects: none</div>
              <div class="speak-row">
                <button class="accent" id="btnServo4Turn">Servo P4 (5s)</button>
                <span id="servo4Status" class="speak-status">Servo P4: en attente</span>
              </div>
            </div>
          </div>
        </div>

        <div class="below-row">
          <div class="subpanel">
            <h3>Drive</h3>
            <div class="control-row">
              <label for="throttle">Throttle (-100 to 100)</label>
              <input id="throttle" type="range" min="-100" max="100" value="0" step="1" />
            </div>
            <div class="control-row">
              <label for="steer">Steering (-35 to 35)</label>
              <input id="steer" type="range" min="-35" max="35" value="0" step="1" />
            </div>
            <div class="buttons">
              <button class="main-btn" id="btnForward">Forward</button>
              <button id="btnStop">Stop</button>
              <button class="main-btn" id="btnBackward">Backward</button>
              <button id="btnLeft">Steer Left</button>
              <button id="btnCenter">Steer Center</button>
              <button id="btnRight">Steer Right</button>
            </div>
            <p class="hint">Keyboard: W/S throttle, A/D steer, Space stop</p>
          </div>

          <div class="subpanel">
            <h3>Telemetry</h3>
            <div id="telemetry" class="telemetry">No data yet</div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const telemetryEl = document.getElementById("telemetry");
    const batteryWidgetEl = document.getElementById("batteryWidget");
    const batteryLevelEl = document.getElementById("batteryLevel");
    const batteryTextEl = document.getElementById("batteryText");

    const throttleEl = document.getElementById("throttle");
    const steerEl = document.getElementById("steer");
    const panEl = document.getElementById("pan");
    const tiltEl = document.getElementById("tilt");
    const cameraFeedEl = document.getElementById("cameraFeed");
    const cameraInfoEl = document.getElementById("cameraInfo");
    const detectOverlayEl = document.getElementById("detectOverlay");
    const cameraJoystickAreaEl = document.getElementById("cameraJoystickArea");
    const cameraJoystickKnobEl = document.getElementById("cameraJoystickKnob");
    const cameraJoystickReadoutEl = document.getElementById("cameraJoystickReadout");
    const speakTextEl = document.getElementById("speakText");
    const speakStatusEl = document.getElementById("speakStatus");
    const musicSelectEl = document.getElementById("musicSelect");
    const musicStatusEl = document.getElementById("musicStatus");
    const detectStatusEl = document.getElementById("detectStatus");
    const detectResultEl = document.getElementById("detectResult");
    const servo4StatusEl = document.getElementById("servo4Status");
    const joystickAreaEl = document.getElementById("joystickArea");
    const joystickKnobEl = document.getElementById("joystickKnob");
    const joystickReadoutEl = document.getElementById("joystickReadout");

    let ws;
    let heartbeatTimer;
    let camSourceIdx = 0;
    let camRetryTimer;
    let camSources = [];
    let lowLatencyFrameTimer;
    let batteryPollTimer;
    let joystickActive = false;
    let cameraJoystickActive = false;

    function clampInt(value, low, high) {
      return Math.max(low, Math.min(high, Math.round(value)));
    }

    function batteryPercentFromVoltage(voltageV) {
      // Approximate 2S Li-ion/LiPo mapping for PiCar packs.
      const minV = 6.4;
      const maxV = 8.4;
      const ratio = (Number(voltageV) - minV) / (maxV - minV);
      return clampInt(ratio * 100, 0, 100);
    }

    function updateBatteryGauge(battery) {
      if (!battery || battery.available === false) {
        batteryWidgetEl.classList.add("na");
        batteryWidgetEl.classList.remove("low");
        batteryLevelEl.style.width = "18%";
        batteryTextEl.textContent = "N/A";
        return;
      }

      let percent = Number(battery.percent);
      const hasPercent = Number.isFinite(percent);
      const voltage = Number(battery.voltage_v);
      const hasVoltage = Number.isFinite(voltage);

      if (!hasPercent && hasVoltage) {
        percent = batteryPercentFromVoltage(voltage);
      }

      if (!Number.isFinite(percent)) {
        batteryWidgetEl.classList.add("na");
        batteryWidgetEl.classList.remove("low");
        batteryLevelEl.style.width = "18%";
        batteryTextEl.textContent = hasVoltage ? `${voltage.toFixed(2)}V` : "N/A";
        return;
      }

      percent = clampInt(percent, 0, 100);
      batteryWidgetEl.classList.remove("na");
      batteryWidgetEl.classList.toggle("low", percent <= 20);
      batteryLevelEl.style.width = `${percent}%`;
      batteryTextEl.textContent = hasVoltage ? `${percent}% (${voltage.toFixed(2)}V)` : `${percent}%`;
    }

    async function refreshBatteryGauge() {
      try {
        const resp = await fetch("/api/health", { cache: "no-store" });
        const data = await resp.json();
        updateBatteryGauge(data?.robot?.battery || null);
      } catch (_) {
        updateBatteryGauge(null);
      }
    }

    function connect() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      ws = new WebSocket(`${proto}://${location.host}/ws`);

      ws.onopen = () => {
        statusEl.textContent = "connected";
        statusEl.style.background = "#ddfff5";
        startHeartbeat();
      };

      ws.onclose = () => {
        statusEl.textContent = "disconnected";
        statusEl.style.background = "#ffe9e9";
        stopHeartbeat();
        setTimeout(connect, 700);
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        telemetryEl.textContent = JSON.stringify(msg, null, 2);
        if (msg.type === "speak_ack") {
          speakStatusEl.textContent = msg.ok ? "TTS: lecture OK" : `TTS erreur: ${msg.detail}`;
        }
        if (msg.type === "state") {
          if (msg.tts_ready) {
            speakStatusEl.textContent = `TTS: pret (${msg.tts_engine})`;
          } else {
            speakStatusEl.textContent = "TTS: indisponible";
          }
          updateBatteryGauge(msg.robot?.battery || null);
        }
        if (msg.type === "music_ack") {
          musicStatusEl.textContent = msg.ok ? `Music: ${msg.detail}` : `Music erreur: ${msg.detail}`;
        }
        if (msg.type === "detect_ack") {
          detectStatusEl.textContent = msg.ok ? `Vision: ${msg.detail}` : `Vision erreur: ${msg.detail}`;
        }
        if (msg.type === "servo4_ack") {
          servo4StatusEl.textContent = msg.ok ? `Servo P4: ${msg.detail}` : `Servo P4 erreur: ${msg.detail}`;
        }
      };
    }

    function send(payload) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify(payload));
    }

    function clamp(value, low, high) {
      return Math.max(low, Math.min(high, value));
    }

    function drive() {
      send({
        type: "drive",
        throttle: Number(throttleEl.value),
        steer: Number(steerEl.value),
      });
    }

    function setCamera() {
      send({
        type: "camera",
        pan: Number(panEl.value),
        tilt: Number(tiltEl.value),
      });
    }

    function speak() {
      const text = speakTextEl.value.trim();
      if (!text) {
        speakStatusEl.textContent = "TTS: texte vide";
        return;
      }
      speakStatusEl.textContent = "TTS: lecture en cours...";
      send({ type: "speak", text });
    }

    function playMusic() {
      musicStatusEl.textContent = "Music: lancement...";
      send({ type: "play_music", file: musicSelectEl.value || null });
    }

    function stopMusic() {
      send({ type: "stop_music" });
    }

    async function detectObject() {
      detectStatusEl.textContent = "Vision: detection snapshot...";
      detectResultEl.textContent = "Seen objects: scanning...";
      try {
        const resp = await fetch("/api/detect_snapshot", { cache: "no-store" });
        const data = await resp.json();
        drawDetections(data.objects || []);
        if (data.ok && Array.isArray(data.objects) && data.objects.length > 0) {
          const top = data.objects[0];
          const conf = Math.round(Number(top.confidence || 0) * 100);
          detectStatusEl.textContent = `Vision: ${top.label} (${conf}%)`;

          const seenList = data.objects
            .slice(0, 4)
            .map((obj) => `${obj.label} (${Math.round(Number(obj.confidence || 0) * 100)}%)`)
            .join(", ");
          detectResultEl.textContent = `Seen objects: ${seenList}`;
        } else {
          detectStatusEl.textContent = `Vision erreur: ${data.detail || "no object detected"}`;
          detectResultEl.textContent = "Seen objects: none";
        }
      } catch (err) {
        detectStatusEl.textContent = `Vision erreur: ${err}`;
        detectResultEl.textContent = "Seen objects: error";
      }
    }

    function turnServo4() {
      servo4StatusEl.textContent = "Servo P4: rotation 5s...";
      send({ type: "servo4_turn" });
    }

    function stop() {
      throttleEl.value = 0;
      send({ type: "stop" });
      drive();
    }

    function startHeartbeat() {
      heartbeatTimer = setInterval(() => send({ type: "heartbeat" }), 350);
    }

    function stopHeartbeat() {
      clearInterval(heartbeatTimer);
    }

    function ensureOverlayCanvasSize() {
      const w = cameraFeedEl.clientWidth || 640;
      const h = cameraFeedEl.clientHeight || 480;
      if (detectOverlayEl.width !== w) detectOverlayEl.width = w;
      if (detectOverlayEl.height !== h) detectOverlayEl.height = h;
    }

    function drawDetections(objects) {
      ensureOverlayCanvasSize();
      const ctx = detectOverlayEl.getContext("2d");
      ctx.clearRect(0, 0, detectOverlayEl.width, detectOverlayEl.height);

      if (!Array.isArray(objects) || objects.length === 0) return;

      const sx = detectOverlayEl.width / Number(objects[0].w || detectOverlayEl.width);
      const sy = detectOverlayEl.height / Number(objects[0].h || detectOverlayEl.height);

      ctx.lineWidth = 2;
      ctx.font = "13px JetBrains Mono";
      objects.slice(0, 4).forEach((obj) => {
        const x = Number(obj.x1) * sx;
        const y = Number(obj.y1) * sy;
        const w = (Number(obj.x2) - Number(obj.x1)) * sx;
        const h = (Number(obj.y2) - Number(obj.y1)) * sy;

        ctx.strokeStyle = "#13b88d";
        ctx.fillStyle = "rgba(19, 184, 141, 0.14)";
        ctx.fillRect(x, y, w, h);
        ctx.strokeRect(x, y, w, h);

        const txt = `${obj.label} ${Math.round(Number(obj.confidence || 0) * 100)}%`;
        const tw = ctx.measureText(txt).width;
        const ty = Math.max(14, y - 6);
        ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
        ctx.fillRect(x, ty - 12, tw + 8, 16);
        ctx.fillStyle = "#eafff9";
        ctx.fillText(txt, x + 4, ty);
      });
    }


    function setJoystickVisual(dx, dy) {
      joystickKnobEl.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }

    function setCameraJoystickVisual(dx, dy) {
      cameraJoystickKnobEl.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    }

    function resetJoystick() {
      setJoystickVisual(0, 0);
      joystickReadoutEl.textContent = "x: 0.00 y: 0.00";
      throttleEl.value = 0;
      steerEl.value = 0;
      drive();
    }

    function updateJoystickFromPointer(clientX, clientY) {
      const rect = joystickAreaEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      const maxRadius = Math.min(rect.width, rect.height) * 0.36;
      let dx = clientX - cx;
      let dy = clientY - cy;
      const dist = Math.hypot(dx, dy);
      if (dist > maxRadius) {
        const scale = maxRadius / dist;
        dx *= scale;
        dy *= scale;
      }

      const nx = clamp(dx / maxRadius, -1, 1);
      const ny = clamp(dy / maxRadius, -1, 1);

      steerEl.value = String(Math.round(nx * 35));
      throttleEl.value = String(Math.round(-ny * 100));
      joystickReadoutEl.textContent = `x: ${nx.toFixed(2)} y: ${(-ny).toFixed(2)}`;
      setJoystickVisual(dx, dy);
      drive();
    }

    function updateCameraJoystickFromPointer(clientX, clientY) {
      const rect = cameraJoystickAreaEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      const maxRadius = Math.min(rect.width, rect.height) * 0.36;
      let dx = clientX - cx;
      let dy = clientY - cy;
      const dist = Math.hypot(dx, dy);
      if (dist > maxRadius) {
        const scale = maxRadius / dist;
        dx *= scale;
        dy *= scale;
      }

      const nx = clamp(dx / maxRadius, -1, 1);
      const ny = clamp(dy / maxRadius, -1, 1);

      panEl.value = String(Math.round(nx * 60));
      tiltEl.value = String(Math.round(-ny * 35));
      cameraJoystickReadoutEl.textContent = `pan: ${panEl.value} tilt: ${tiltEl.value}`;
      setCameraJoystickVisual(dx, dy);
      setCamera();
    }

    function syncCameraJoystickFromSliders() {
      const panNorm = clamp(Number(panEl.value) / 60, -1, 1);
      const tiltNorm = clamp(Number(tiltEl.value) / 35, -1, 1);

      const rect = cameraJoystickAreaEl.getBoundingClientRect();
      const maxRadius = Math.min(rect.width, rect.height) * 0.36;
      const dx = panNorm * maxRadius;
      const dy = -tiltNorm * maxRadius;

      setCameraJoystickVisual(dx, dy);
      cameraJoystickReadoutEl.textContent = `pan: ${panEl.value} tilt: ${tiltEl.value}`;
    }

    async function initCameraFeed() {
      try {
        const resp = await fetch("/api/camera", { cache: "no-store" });
        const data = await resp.json();
        const directUrl = `${location.protocol}//${location.hostname}:${data.stream_port}${data.stream_path}`;
        const proxyUrl = `${data.proxy_path}`;
        const directJpgUrl = `${location.protocol}//${location.hostname}:${data.stream_port}/mjpg.jpg`;
        const proxyJpgUrl = `/video_feed_jpg`;

        // Prefer latest-JPEG polling to reduce latency from MJPEG buffering.
        camSources = [directJpgUrl, proxyJpgUrl, directUrl, proxyUrl];
        camSourceIdx = 0;

        cameraFeedEl.onload = () => {
          clearTimeout(camRetryTimer);
          clearTimeout(lowLatencyFrameTimer);
          cameraInfoEl.textContent = `Live stream: ${camSources[camSourceIdx]}`;

          // For JPEG endpoints, request the newest frame repeatedly.
          if (camSources[camSourceIdx].includes("mjpg.jpg") || camSources[camSourceIdx] === "/video_feed_jpg") {
            lowLatencyFrameTimer = setTimeout(() => {
              cameraFeedEl.src = `${camSources[camSourceIdx]}?t=${Date.now()}`;
            }, 70);
          }
        };

        cameraFeedEl.onerror = () => {
          clearTimeout(lowLatencyFrameTimer);
          camSourceIdx = (camSourceIdx + 1) % camSources.length;
          const next = `${camSources[camSourceIdx]}?t=${Date.now()}`;
          cameraInfoEl.textContent = `Camera source failed, retrying: ${next}`;
          clearTimeout(camRetryTimer);
          camRetryTimer = setTimeout(() => {
            cameraFeedEl.src = next;
          }, 1200);
        };

        if (!data.ready && data.error) {
          cameraInfoEl.textContent = `Camera backend warning: ${data.error}`;
        }

        cameraFeedEl.src = `${camSources[camSourceIdx]}?t=${Date.now()}`;
        ensureOverlayCanvasSize();
      } catch (err) {
        cameraInfoEl.textContent = `Camera status check failed: ${err}`;
      }
    }

    async function initMusicCatalog() {
      try {
        const resp = await fetch("/api/music", { cache: "no-store" });
        const data = await resp.json();
        const files = Array.isArray(data.files) ? data.files : [];

        musicSelectEl.innerHTML = "";
        if (files.length === 0) {
          const opt = document.createElement("option");
          opt.value = "";
          opt.textContent = "No tracks found";
          musicSelectEl.appendChild(opt);
          musicSelectEl.disabled = true;
          musicStatusEl.textContent = data.error ? `Music: ${data.error}` : "Music: no tracks";
          return;
        }

        files.forEach((name) => {
          const opt = document.createElement("option");
          opt.value = name;
          opt.textContent = name;
          musicSelectEl.appendChild(opt);
        });

        if (data.current && files.includes(data.current)) {
          musicSelectEl.value = data.current;
        }
        musicSelectEl.disabled = false;
      } catch (err) {
        musicSelectEl.innerHTML = "";
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "Music list error";
        musicSelectEl.appendChild(opt);
        musicSelectEl.disabled = true;
        musicStatusEl.textContent = `Music: catalog error (${err})`;
      }
    }

    throttleEl.addEventListener("input", drive);
    steerEl.addEventListener("input", drive);
    panEl.addEventListener("input", () => {
      setCamera();
      syncCameraJoystickFromSliders();
    });
    tiltEl.addEventListener("input", () => {
      setCamera();
      syncCameraJoystickFromSliders();
    });

    joystickAreaEl.addEventListener("pointerdown", (ev) => {
      joystickActive = true;
      joystickAreaEl.setPointerCapture(ev.pointerId);
      updateJoystickFromPointer(ev.clientX, ev.clientY);
    });

    joystickAreaEl.addEventListener("pointermove", (ev) => {
      if (!joystickActive) return;
      updateJoystickFromPointer(ev.clientX, ev.clientY);
    });

    const endJoystick = () => {
      joystickActive = false;
      resetJoystick();
    };

    joystickAreaEl.addEventListener("pointerup", endJoystick);
    joystickAreaEl.addEventListener("pointercancel", endJoystick);
    joystickAreaEl.addEventListener("lostpointercapture", () => {
      if (joystickActive) endJoystick();
    });

    cameraJoystickAreaEl.addEventListener("pointerdown", (ev) => {
      cameraJoystickActive = true;
      cameraJoystickAreaEl.setPointerCapture(ev.pointerId);
      updateCameraJoystickFromPointer(ev.clientX, ev.clientY);
    });

    cameraJoystickAreaEl.addEventListener("pointermove", (ev) => {
      if (!cameraJoystickActive) return;
      updateCameraJoystickFromPointer(ev.clientX, ev.clientY);
    });

    const endCameraJoystick = () => {
      cameraJoystickActive = false;
      syncCameraJoystickFromSliders();
    };

    cameraJoystickAreaEl.addEventListener("pointerup", endCameraJoystick);
    cameraJoystickAreaEl.addEventListener("pointercancel", endCameraJoystick);
    cameraJoystickAreaEl.addEventListener("lostpointercapture", () => {
      if (cameraJoystickActive) endCameraJoystick();
    });

    document.getElementById("btnForward").addEventListener("click", () => {
      throttleEl.value = 60;
      drive();
    });
    document.getElementById("btnBackward").addEventListener("click", () => {
      throttleEl.value = -50;
      drive();
    });
    document.getElementById("btnStop").addEventListener("click", stop);
    document.getElementById("btnLeft").addEventListener("click", () => {
      steerEl.value = -25;
      drive();
    });
    document.getElementById("btnCenter").addEventListener("click", () => {
      steerEl.value = 0;
      drive();
    });
    document.getElementById("btnRight").addEventListener("click", () => {
      steerEl.value = 25;
      drive();
    });

    document.getElementById("btnApplyCam").addEventListener("click", setCamera);
    document.getElementById("btnRecenterCam").addEventListener("click", () => {
      panEl.value = -2;
      tiltEl.value = 0;
      send({ type: "recenter_camera" });
      syncCameraJoystickFromSliders();
    });
    document.getElementById("btnSpeak").addEventListener("click", speak);
    document.getElementById("btnPlayMusic").addEventListener("click", playMusic);
    document.getElementById("btnStopMusic").addEventListener("click", stopMusic);
    document.getElementById("btnDetectObject").addEventListener("click", detectObject);
    document.getElementById("btnServo4Turn").addEventListener("click", turnServo4);
    document.getElementById("btnEmergency").addEventListener("click", stop);

    speakTextEl.addEventListener("keydown", (ev) => {
      if ((ev.ctrlKey || ev.metaKey) && ev.key === "Enter") {
        ev.preventDefault();
        speak();
      }
    });

    document.addEventListener("keydown", (ev) => {
      const target = ev.target;
      const isTypingField =
        target &&
        (
          target.tagName === "INPUT" ||
          target.tagName === "TEXTAREA" ||
          target.tagName === "SELECT" ||
          target.isContentEditable
        );
      if (isTypingField) return;

      if (ev.repeat) return;
      if (ev.code === "KeyW") {
        throttleEl.value = Math.min(100, Number(throttleEl.value) + 15);
        drive();
      }
      if (ev.code === "KeyS") {
        throttleEl.value = Math.max(-100, Number(throttleEl.value) - 15);
        drive();
      }
      if (ev.code === "KeyA") {
        steerEl.value = Math.max(-35, Number(steerEl.value) - 10);
        drive();
      }
      if (ev.code === "KeyD") {
        steerEl.value = Math.min(35, Number(steerEl.value) + 10);
        drive();
      }
      if (ev.code === "Space") {
        ev.preventDefault();
        stop();
      }
      if (ev.code === "ArrowLeft") {
        panEl.value = Math.max(-60, Number(panEl.value) - 5);
        setCamera();
      }
      if (ev.code === "ArrowRight") {
        panEl.value = Math.min(60, Number(panEl.value) + 5);
        setCamera();
      }
      if (ev.code === "ArrowUp") {
        tiltEl.value = Math.min(35, Number(tiltEl.value) + 5);
        setCamera();
      }
      if (ev.code === "ArrowDown") {
        tiltEl.value = Math.max(-35, Number(tiltEl.value) - 5);
        setCamera();
      }
    });

    connect();
    refreshBatteryGauge();
    batteryPollTimer = setInterval(refreshBatteryGauge, 5000);
    initCameraFeed();
    initMusicCatalog();
    drawDetections([]);
    resetJoystick();
    syncCameraJoystickFromSliders();

    window.addEventListener("resize", ensureOverlayCanvasSize);
  </script>
</body>
</html>
